services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: elysia_demo
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d elysia_demo']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/elysia_demo
      API_PORT: 6000
      JWT_SECRET: compose-jwt-secret-change-me
      JWT_EXPIRES_IN_SECONDS: 3600
      JWT_REFRESH_EXPIRES_IN_SECONDS: 604800
      REDIS_URL: redis://redis:6379
    ports:
      - '6000:6000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:6000
    ports:
      - '7000:7000'
    depends_on:
      - api

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:6000
    ports:
      - '8000:8000'
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
