services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: elysia_demo
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d elysia_demo']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      PG_HOST: db
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_DATABASE: elysia_demo
      API_PORT: 3000
      JWT_SECRET: compose-jwt-secret-change-me
      JWT_EXPIRES_IN_SECONDS: 3600
      JWT_REFRESH_EXPIRES_IN_SECONDS: 604800
      REDIS_URL: redis://redis:6379
    ports:
      - '3000:3000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'bun -e "fetch(\"http://127.0.0.1:3000/ready\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    ports:
      - '7000:7000'
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    ports:
      - '8000:8000'
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
