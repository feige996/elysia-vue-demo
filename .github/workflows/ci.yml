name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PG_HOST: localhost
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_DATABASE: elysia_demo
      API_PORT: 9000
      ADMIN_PORT: 7000
      WEB_PORT: 8000
      JWT_SECRET: ci-jwt-secret
      JWT_REFRESH_EXPIRES_IN_SECONDS: 604800
      E2E_API_BASE_URL: http://127.0.0.1:9000
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: elysia_demo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d elysia_demo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Dependency audit
        run: bun audit
        continue-on-error: true

      - name: Run database migrations
        run: bun run --cwd api db:migrate

      - name: Check database health
        run: bun run --cwd api db:check

      - name: Seed database
        run: bun run --cwd api db:seed

      - name: Check migration drift
        run: |
          bun run --cwd api db:generate
          if [ -n "$(git status --porcelain -- api/drizzle)" ]; then
              echo "Drizzle migration drift detected. Please commit generated migration files."
              git status --short -- api/drizzle
              exit 1
          fi

      - name: Check OpenAPI drift
        run: |
          bun run --cwd api openapi:generate
          if [ -n "$(git status --porcelain -- api/openapi.generated.json)" ]; then
              echo "OpenAPI drift detected. Please commit api/openapi.generated.json"
              git status --short -- api/openapi.generated.json
              exit 1
          fi

      - name: Typecheck
        run: bun run typecheck

      - name: Lint (oxlint)
        run: bun run lint

      - name: Format check (oxfmt + Prettier Vue)
        run: bun run format:check

      - name: Build (api + web + admin)
        run: bun run build

      - name: Unit test
        run: bun run test:unit

      - name: Integration test
        run: bun run test:integration

      - name: Start API for E2E
        run: |
          bun run --cwd api start &
          echo $! > /tmp/api-ci.pid
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:9000/ready >/dev/null; then
              echo "API ready"
              exit 0
            fi
            sleep 1
          done
          echo "API failed to become ready"
          exit 1

      - name: Admin E2E (auth + write smoke)
        run: bun run test:e2e:admin

      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/api-ci.pid ]; then
            kill "$(cat /tmp/api-ci.pid)" 2>/dev/null || true
          fi
